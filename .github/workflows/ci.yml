name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-python:
    name: build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install libvpx + tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libvpx-dev pkg-config cmake ninja-build ffmpeg

      - name: Install libvpx + tools (macOS)
        if: runner.os == 'macOS'
        run: brew install libvpx pkg-config cmake ninja ffmpeg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: CMake build + C++ self-test (bit-exact)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          ./build/dccli selftest

      - name: pip install (compiles via CMake) + Python round-trip
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install . --no-build-isolation || python -m pip install .
          python tests/roundtrip.py
          python tests/cross_interop.py

      - name: ffmpeg decode-interop (full-range / bit-exact regression guard)
        run: python tests/ffmpeg_interop.py

  browser:
    name: in-browser VP9 lossless (Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libvpx
        run: sudo apt-get update && sudo apt-get install -y libvpx-dev pkg-config cmake ninja-build
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run the headless WebCodecs probe (asserts bit-exact encode->decode)
        working-directory: experiments/webcodecs-lossless
        run: |
          npm init -y >/dev/null 2>&1
          npm i -D playwright
          npx playwright install --with-deps chromium
          node ../../tests/js_quant.mjs
          node ../../tests/js_signals.mjs
          node ../../tests/webm_stream.mjs
          BROWSER=chromium node run.mjs single 256 | tee out.txt
          grep -q "EXACT" out.txt
          BROWSER=chromium node run.mjs streaming 256 12 | tee stream.txt
          grep -q "YES ✓" stream.txt
          BROWSER=chromium node run.mjs network 256 8 | tee network.txt
          grep -q "YES ✓" network.txt
          BROWSER=chromium node run.mjs multisignal 128 6 | tee multi.txt
          grep -q "YES ✓" multi.txt
          node smoke-demo.mjs | tee demo.txt
          grep -q "bit-exact" demo.txt
