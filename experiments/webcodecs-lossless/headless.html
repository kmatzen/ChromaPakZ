<!doctype html><meta charset="utf-8"><title>headless probe</title>
<script type="module">
import { makeDepth, makeDepthSeq, runProbe, runProbeGOP, runProbe10GOP, probeHighDepth } from './probe.js';
import * as DC from '../../src/chromapakz.js';
import { demux } from '../../src/webm.js';
import { normalizeMetadata } from '../../src/signals.js';
import { SCHEMES } from './probe.js';

// True codec rate-distortion: feed ALREADY-QUANTIZED uint16 depth (a multi-frame clip) through the
// real VP9 encode/decode path (inter-coded) at varying QP; measure PSNR of decoded-vs-source codes
// (QP0 = lossless = exact). Also export the exact codes so Python can score FFV1/PNG on the same data.
window.__rdSweep = async (W=256, H=256, N=12) => {
  const seq = makeDepthSeq(W, H, N);             // array of uint16 code frames (already quantized)
  const sch = SCHEMES['triangle-fold'];
  const packed = seq.map(sch.pack);
  const hiSeq = packed.map(p=>p.hi), loSeq = packed.map(p=>p.lo);
  const codec = 'vp09.00.10.08', PEAK = 65535, PX = W*H*N;
  const frame = (plane,i) => { const buf=new Uint8Array(W*H+2*(W>>1)*(H>>1));
    buf.set(plane,0); buf.fill(128,W*H);
    return new VideoFrame(buf,{format:'I420',codedWidth:W,codedHeight:H,timestamp:i*1000,
      colorSpace:{primaries:'bt709',transfer:'iec61966-2-1',matrix:'bt709',fullRange:true}}); };
  const readY = async f => { const d=new Uint8Array(f.allocationSize()); const L=await f.copyTo(d); const y=L[0];
    const o=new Uint8Array(W*H); for(let r=0;r<H;r++) o.set(d.subarray(y.offset+r*y.stride,y.offset+r*y.stride+W),r*W); return o; };
  const rtSeq = (planes, qp) => new Promise((res,rej)=>{ let bytes=0; const rec=[];
    const dec=new VideoDecoder({output:async f=>{try{rec.push(await readY(f));}finally{f.close();}},error:rej});
    const enc=new VideoEncoder({output:(c,m)=>{if(m?.decoderConfig)dec.configure(m.decoderConfig);bytes+=c.byteLength;dec.decode(c);},error:rej});
    enc.configure({codec,width:W,height:H,bitrateMode:'quantizer',latencyMode:'quality'});
    planes.forEach((p,i)=>{const fr=frame(p,i);enc.encode(fr,{keyFrame:i===0,vp9:{quantizer:qp}});fr.close();});
    enc.flush().then(()=>dec.flush()).then(()=>{enc.close();dec.close();res({bytes,rec});}).catch(rej); });
  const rows=[];
  for(const qp of [0,8,16,24,32,48,63]){
    const rh=await rtSeq(hiSeq,qp), rl=await rtSeq(loSeq,qp);
    let se=0; for(let i=0;i<N;i++){ const d2=sch.unpack(rh.rec[i], rl.rec[i]), src=seq[i];
      for(let j=0;j<src.length;j++){ const e=src[j]-d2[j]; se+=e*e; } }
    const mse=se/PX;
    rows.push({ qp, bpp:(rh.bytes+rl.bytes)*8/PX, mse, exact:mse===0,
      psnr: mse===0 ? null : 10*Math.log10(PEAK*PEAK/mse) });
  }
  const raw=new Uint8Array(PX*2); const dv=new DataView(raw.buffer);
  for(let i=0;i<N;i++) for(let j=0;j<W*H;j++) dv.setUint16((i*W*H+j)*2, seq[i][j], true);
  let bin=''; for(let i=0;i<raw.length;i++) bin+=String.fromCharCode(raw[i]);
  return { rows, codesB64: btoa(bin), W, H, N };
};

// Decode an externally-supplied .webm (e.g. made by the C++/Python impl) and, if a raw
// uint16-LE reference is given, verify depth is bit-exact. Proves native→browser interop.
window.__decodeWebMCompare = async (webmB64, refB64) => {
  const webm = Uint8Array.from(atob(webmB64), c=>c.charCodeAt(0));
  const dec = await DC.decode(webm);
  const depthSeries = dec.signalSeries?.depth ?? [];
  const N = depthSeries.length, px = dec.width*dec.height;
  let exact=true, dMax=0;
  if(refB64){ const ref=new Uint16Array(Uint8Array.from(atob(refB64), c=>c.charCodeAt(0)).buffer);
    for(let i=0;i<N;i++){ const B=depthSeries[i].u16;
      for(let j=0;j<px;j++){ const d=Math.abs(ref[i*px+j]-B[j]); if(d>dMax)dMax=d; if(d)exact=false; } } }
  const idx=[0, (px/4)|0, (px/2)|0, (3*px/4)|0, px-1];
  const sampleFloats = depthSeries[0]?.float ? idx.map(i=>depthSeries[0].float[i]) : null;
  const depthSig = dec.signals?.find(s=>s.id==='depth');
  return { N, width:dec.width, height:dec.height, rgbFrames: dec.rgb?dec.rgb.length:0,
           exact, dMax, levels: depthSig?.quant?.levels ?? null, sampleFloats, idx, metadata:dec.metadata };
};

// Streaming createEncoder/createDecoder + autoNearFar; must match batch encode/decode bit-exact.
window.__runStreamingWebM = async (W=256, H=256, N=12) => {
  const depthFloat=[], rgb=[];
  for(let f=0; f<N; f++){
    const z=new Float32Array(W*H);
    for(let i=0;i<z.length;i++) z[i]=0.4+(i%80)*0.04+(f*0.01);
    depthFloat.push(z);
    const a=new Uint8Array(W*H*4);
    for(let r=0;r<H;r++) for(let c=0;c<W;c++){ const o=(r*W+c)*4;
      a[o]=(c+f)&255; a[o+1]=r&255; a[o+2]=128; a[o+3]=255; }
    rgb.push(a);
  }
  const { near, far }=DC.autoNearFar(depthFloat);
  const refCodes=depthFloat.map(z=>DC.quantizeInverseDepth(z,near,far));

  const enc=DC.createEncoder({ W,H,fps:30, signals:[{ id:'depth', near, far }] });
  for(let i=0;i<N;i++) await enc.addFrame({ rgb:rgb[i], signals:{ depth:{ float:depthFloat[i] } } });
  const bytes=await enc.finish();

  const dec=DC.createDecoder(bytes);
  if(dec.near!==near || dec.far!==far) throw new Error('decoder near/far mismatch metadata');
  if(dec.frameCount!==N && dec.metadata.frames!=null) throw new Error('decoder frameCount mismatch');
  let i=0, exact=true, dMax=0;
  for await (const frame of dec){
    const A=refCodes[i], B=frame.signals.depth.u16;
    for(let j=0;j<A.length;j++){ const d=Math.abs(A[j]-B[j]); if(d>dMax)dMax=d; if(d)exact=false; }
    i++;
  }
  await dec.close();

  const frames=depthFloat.map((z,fi)=>({ rgb:rgb[fi], signals:{ depth:{ float:z } } }));
  const batch=await DC.encode({ W,H,fps:30, signals:[{ id:'depth', near, far }], frames });
  const batchDec=await DC.decode(batch);
  let batchExact=true;
  for(let k=0;k<N;k++){ const A=refCodes[k], B=batchDec.signalSeries.depth[k].u16;
    for(let j=0;j<A.length;j++) if(A[j]!==B[j]) batchExact=false; }

  let throwsMissing=false;
  try{ DC.createEncoder({ W,H }); }catch{ throwsMissing=true; }

  return { exact, dMax, N:i, batchExact, throwsMissing,
    signalCount: dec.signals?.length ?? 0,
    near, far, streamBytes:bytes.length, batchBytes:batch.length };
};

// Network byte streaming: onChunk → chunked push → createDecoder() without full buffer first.
// depth + objectId lossless signals in one clip (v2 metadata).
window.__runMultiSignalWebM = async (W=128, H=96, N=6) => {
  const depthFloat=[], objectId=[], rgb=[];
  for(let f=0; f<N; f++){
    const z=new Float32Array(W*H);
    const oid=new Uint16Array(W*H);
    for(let i=0;i<W*H;i++){ z[i]=0.5+(i%40)*0.05; oid[i]=1000+f*10+(i%256); }
    depthFloat.push(z); objectId.push(oid);
    rgb.push(new Uint8Array(W*H*4).fill(200));
  }
  const { near, far }=DC.autoNearFar(depthFloat);
  const enc=DC.createEncoder({
    W,H,fps:30,
    signals:[{ id:'depth', near, far }, { id:'objectId' }],
  });
  for(let i=0;i<N;i++) await enc.addFrame({ rgb:rgb[i], signals:{ depth:{ float:depthFloat[i] }, objectId:{ u16:objectId[i] } } });
  const bytes=await enc.finish();
  const dec=DC.createDecoder(bytes);
  if(dec.signals.length!==2) throw new Error('expected 2 signals in metadata');
  if(dec.metadata.version!==2) throw new Error('expected metadata version 2');
  let exactDepth=true, exactOid=true, i=0;
  for await (const frame of dec){
    const A=DC.quantizeInverseDepth(depthFloat[i],near,far), B=frame.signals.depth.u16;
    for(let j=0;j<A.length;j++) if(A[j]!==B[j]) exactDepth=false;
    const O=objectId[i], R=frame.signals.objectId.u16;
    for(let j=0;j<O.length;j++) if(O[j]!==R[j]) exactOid=false;
    i++;
  }
  await dec.close();
  return { exactDepth, exactOid, N:i, bytes:bytes.length };
};

window.__runNetworkWebM = async (W=256, H=256, N=8) => {
  const depthFloat=[], rgb=[];
  for(let f=0; f<N; f++){
    const z=new Float32Array(W*H);
    for(let i=0;i<z.length;i++) z[i]=0.5+(i%50)*0.03+f*0.02;
    depthFloat.push(z);
    rgb.push(new Uint8Array(W*H*4).fill(128));
  }
  const { near, far }=DC.autoNearFar(depthFloat);
  const refCodes=depthFloat.map(z=>DC.quantizeInverseDepth(z,near,far));
  const sig=[{ id:'depth', near, far }];
  const frames=depthFloat.map((z,i)=>({ rgb:rgb[i], signals:{ depth:{ float:z } } }));
  const bytes=await DC.encode({ W,H,fps:30, signals:sig, frames });

  const dec=DC.createDecoder();
  const chunkSize=512;
  for(let o=0;o<bytes.length;o+=chunkSize) dec.push(bytes.subarray(o, Math.min(o+chunkSize, bytes.length)));
  dec.finish();
  if(!dec.ready) throw new Error('network decoder never got metadata');
  let i=0, exact=true, dMax=0;
  for(;;){
    const frame=await dec.readFrame();
    if(!frame) break;
    const A=refCodes[i], B=frame.signals.depth.u16;
    for(let j=0;j<A.length;j++){ const d=Math.abs(A[j]-B[j]); if(d>dMax)dMax=d; if(d)exact=false; }
    i++;
  }
  await dec.close();

  const chunks=[];
  const enc=DC.createEncoder({ W,H,fps:30, signals:sig, onChunk:c=>chunks.push(c) });
  for(let f=0;f<N;f++) await enc.addFrame(frames[f]);
  const streamBytes=await enc.finish();
  const batchDec=await DC.decode(streamBytes);
  let streamExact=true;
  for(let k=0;k<N;k++){ const A=refCodes[k], B=batchDec.signalSeries.depth[k].u16;
    for(let j=0;j<A.length;j++) if(A[j]!==B[j]) streamExact=false; }

  return { exact, dMax, N:i, chunks:chunks.length, bytes:bytes.length, streamExact,
    near:dec.near, far:dec.far };
};

window.__runWebM = async (W=256, H=256, N=30) => {
  const depth = makeDepthSeq(W, H, N);
  const rgb = [];
  for (let f=0; f<N; f++){ const a=new Uint8Array(W*H*4);
    for (let r=0;r<H;r++) for (let c=0;c<W;c++){ const o=(r*W+c)*4;
      a[o]=(c+f*4)&255; a[o+1]=r&255; a[o+2]=128; a[o+3]=255; } rgb.push(a); }
  const bytes = await DC.encode({ W, H, fps:30, signals:[{ id:'depth', near:0.2, far:10 }], frames: depth.map((d,i)=>({ rgb:rgb[i], signals:{ depth:{ u16:d } } })) });
  const dec = await DC.decode(bytes);
  let dMax=0, exact=true;
  for (let i=0;i<N;i++){ const A=depth[i], B=dec.signalSeries.depth[i].u16;
    for (let j=0;j<A.length;j++){ const d=Math.abs(A[j]-B[j]); if(d>dMax)dMax=d; if(d)exact=false; } }
  // float round-trip error (quantization boundary, expected nonzero)
  const zf = DC.dequantizeInverseDepth(depth[0], 0.2, 10);
  const zq = DC.quantizeInverseDepth(zf, 0.2, 10);
  let qExact=true; for(let j=0;j<zq.length;j++){ if(zq[j]!==depth[0][j]){ qExact=false; break; } }
  const b64 = u8 => { let s=''; for(let i=0;i<u8.length;i++) s+=String.fromCharCode(u8[i]); return btoa(s); };
  window.__lastWebM = b64(bytes);
  const raw = new Uint8Array(N*W*H*2); const dv=new DataView(raw.buffer);
  for(let i=0;i<N;i++) for(let j=0;j<W*H;j++) dv.setUint16((i*W*H+j)*2, depth[i][j], true);
  window.__lastDepth = b64(raw);
  const d2 = demux(bytes); const per={};
  for (const f of d2.frames) per[f.track]=(per[f.track]||0)+f.data.length;
  const trackInfo = Object.values(d2.tracks).map(t=>({ n:t.number, name:t.name, codec:t.codecID,
    w:t.width, h:t.height, frames:t.frames.length, bytes:per[t.number]||0 }));
  return { totalBytes:bytes.length, exact, dMax, qStableQuantize:qExact, N, W, H,
    rgbDecoded: dec.rgb?dec.rgb.length:0, trackInfo, metadata:dec.metadata };
};

// What pixel format does this engine's VP9 decoder actually hand back? (explains readback bugs)
window.__decodeFormatProbe = async (webmB64) => {
  const webm = Uint8Array.from(atob(webmB64), c=>c.charCodeAt(0));
  const dm = demux(webm); const meta = normalizeMetadata(dm.metadata);
  const thi = meta.signals.find(s=>s.id==='depth').tracks.hi;
  const frames = dm.frames.filter(f=>f.track===thi).sort((a,b)=>a.timeMs-b.timeMs);
  return await new Promise((res,rej)=>{
    let info=null;
    const dec=new VideoDecoder({ output:f=>{ if(!info) info={ format:f.format, cw:f.codedWidth, ch:f.codedHeight,
        colorSpace:f.colorSpace }; f.close(); }, error:e=>rej(String(e)) });
    dec.configure({ codec:'vp09.00.10.08', codedWidth:dm.metadata.width, codedHeight:dm.metadata.height });
    dec.decode(new EncodedVideoChunk({ type:'key', timestamp:0, data:frames[0].data }));
    dec.flush().then(()=>{ dec.close(); res(info); }).catch(rej);
  });
};
window.__caps = async () => {
  const out = { hasEncoder:'VideoEncoder' in self, hasDecoder:'VideoDecoder' in self,
                secure: self.isSecureContext, codecs:{} };
  if(!out.hasEncoder) return out;
  const tests = {
    'vp9-8bit-quant':  {codec:'vp09.00.10.08', bitrateMode:'quantizer'},
    'vp9-8bit-vbr':    {codec:'vp09.00.10.08'},
    'vp9-10bit-quant': {codec:'vp09.02.10.10', bitrateMode:'quantizer'},
    'av1-8bit-quant':  {codec:'av01.0.04M.08', bitrateMode:'quantizer'},
    'h264-8bit-quant': {codec:'avc1.42001f',   bitrateMode:'quantizer'},
  };
  for(const [k,cfg] of Object.entries(tests)){
    try{ const s=await VideoEncoder.isConfigSupported({width:256,height:256,...cfg});
      out.codecs[k]= s.supported===true; }
    catch(e){ out.codecs[k]='err:'+(e.name||String(e)); }
  }
  return out;
};
window.__runProbe = async (W=256, H=256) => runProbe(makeDepth(W,H), W, H);
window.__runProbeGOP = async (W=256, H=256, N=30) => runProbeGOP(W,H,N);
window.__runProbe10GOP = async (W=256, H=256, N=30) => runProbe10GOP(W,H,N);
window.__probeHighDepth = async (W=256, H=256) => probeHighDepth(W,H);
window.__ready = true;
</script>
